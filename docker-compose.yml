version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-portal-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=school_portal
      - DB_USERNAME=school_user
      - DB_PASSWORD=school_password
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - school-network

  db:
    image: mysql:8.0
    container_name: school-portal-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: school_portal
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: school-portal-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: school_user
      PMA_PASSWORD: school_password
    depends_on:
      - db
    networks:
      - school-network

networks:
  school-network:
    driver: bridge

volumes:
  db_data:
