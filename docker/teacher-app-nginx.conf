server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Teacher API requests to the Laravel backend
    location /teacher-api/ {
        proxy_pass http://school-portal-nginx/teacher-api/;
        proxy_set_header Host school-portal-nginx;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Laravel web routes (downloads, PDFs, storage)
    location /portal/ {
        proxy_pass http://school-portal-nginx/;
        proxy_set_header Host school-portal-nginx;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Proxy storage requests (logos, files)
    location /storage/ {
        proxy_pass http://school-portal-nginx/storage/;
        proxy_set_header Host school-portal-nginx;
    }

    # Static assets
    location /css/ { try_files $uri =404; add_header Cache-Control "no-cache"; }
    location /js/ { try_files $uri =404; add_header Cache-Control "no-cache"; }
    location /icons/ { try_files $uri =404; add_header Cache-Control "no-cache"; }
    location /manifest.json { try_files $uri =404; }
    location /sw.js { try_files $uri =404; add_header Cache-Control "no-cache"; }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
